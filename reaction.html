<!DOCTYPE html>
<html>
<head>
  <title>F1 Reaction Game</title>

  <style>
    body {
      background: #121212;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    .lights {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 40px;
    }

    .light {
      width: 50px;
      height: 50px;
      background: #550000;
      border-radius: 50%;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .light.on {
      background: red;
      box-shadow: 0 0 20px red;
    }

    #clickArea {
      margin: 20px auto;
      width: 200px;
      height: 100px;
      line-height: 100px;
      border: 2px solid white;
      cursor: pointer;
      user-select: none;
    }

    .ready {
      background: green;
      color: black;
      font-weight: bold;
    }

    table {
      margin: auto;
      margin-top: 30px;
      border-collapse: collapse;
    }

    td, th {
      border: 1px solid white;
      padding: 8px;
    }
  </style>
</head>

<body>
<div style="background-color:black; padding:10px; text-align:center;">

 <a href="standings.html">

   Standings

 <a href="reaction.html">

Reaction

  </a>
	
</div>

<h1>F1 Reaction Test</h1>

<div class="lights">
  <div class="light" id="l1"></div>
  <div class="light" id="l2"></div>
  <div class="light" id="l3"></div>
  <div class="light" id="l4"></div>
  <div class="light" id="l5"></div>
</div>

<div id="clickArea">Wait...</div>

<h2>Leaderboard</h2>
<table>
  <thead>
    <tr><th>Name</th><th>Time</th></tr>
  </thead>
  <tbody id="board"></tbody>
</table>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxjy3uO5UnXoeAjgdjIYQtKef4gnmJCj_ZikxW14IM1At12IfPqL6YyF3Fg6soNkF2M1g/exec"; // 🔥 PUT YOUR GOOGLE SCRIPT URL HERE

let lights = [1,2,3,4,5].map(i => document.getElementById("l"+i));
let clickArea = document.getElementById("clickArea");
let board = document.getElementById("board");

let startTime = 0;
let gameState = "idle"; // idle, waiting, ready

function sleep(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function startGame(){
  gameState = "waiting";
  clickArea.innerText = "Wait...";
  clickArea.classList.remove("ready");

  // reset lights
  lights.forEach(l => l.classList.remove("on"));

  // smooth lights ON
  for(let i = 0; i < lights.length; i++){
    lights[i].classList.add("on");
    await sleep(400);
  }

  // random delay (real F1 feel)
  let randomDelay = Math.random() * 2000 + 500;
  await sleep(randomDelay);

  // LIGHTS OUT
  lights.forEach(l => l.classList.remove("on"));

  clickArea.innerText = "CLICK!";
  clickArea.classList.add("ready");

  startTime = performance.now();
  gameState = "ready";
}

clickArea.onclick = async function(){

  // ❌ false start
  if(gameState === "waiting"){
    clickArea.innerText = "❌ False Start!";
    gameState = "idle";
    return;
  }

  if(gameState !== "ready") return;

  gameState = "idle";

  let reactionTime = (performance.now() - startTime)/1000;

  let name = prompt("Enter name:");
  if(name){
    await fetch(URL, {
      method: "POST",
      body: JSON.stringify({name: name, time: reactionTime})
    });
  }

  clickArea.innerText = "Restart";
  clickArea.classList.remove("ready");

  loadData();
};

// restart
clickArea.addEventListener("click", function(){
  if(gameState === "idle" && clickArea.innerText === "Restart"){
    startGame();
  }
});

// load leaderboard
async function loadData(){
  let res = await fetch(URL);
  let data = await res.json();

  let rows = data.slice(1);

  rows.sort((a,b)=> parseFloat(a[1]) - parseFloat(b[1]));

  board.innerHTML = "";

  rows.forEach((row, index)=>{
    let tr = document.createElement("tr");

    if(index === 0){
      tr.style.background = "gold";
      tr.style.color = "black";
    }

    tr.innerHTML = `<td>${row[0]}</td><td>${parseFloat(row[1]).toFixed(3)}</td>`;
    board.appendChild(tr);
  });
}

// auto refresh leaderboard
setInterval(loadData, 3000);

startGame();
loadData();
</script>

</body>
</html>
